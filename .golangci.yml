run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports
    - revive
    - gocritic
    - exportloopref
  disable:
    - scopelint
    - structcheck
    - deadcode
    - varcheck

linters-settings:
  revive:
    rules:
      - name: unexported-return
        disabled: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
    - path: internal/module/.*/repository/sqlc/
      linters:
        - all
  max-issues-per-linter: 50
  max-same-issues: 5
